# tooling-spec: python-v1
name: CI

on:
    pull_request:
    push:
        branches: [main]

jobs:
    test:
        runs-on: windows-latest
        env:
            UV_NO_SYNC: '1'
        steps:
            - uses: actions/checkout@v4
            - uses: astral-sh/setup-uv@v7
              with:
                  enable-cache: false
            - name: Install dependencies
              run: uv sync --locked
            - name: Format check
              run: uv run ruff format --check .
            - name: Lint
              run: uv run ruff check .
            - name: Type check
              run: uv run mypy
            - name: Run tests
              run: uv run pytest
