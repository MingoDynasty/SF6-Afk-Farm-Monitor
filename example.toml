#
# This is an example configuration file.
#

# User code of the CFN profile to monitor
user_code = 1234567890

# Buckler season ID to query
target_season_id = 12

# How often to poll for updates (in seconds)
# Caution: more frequent polling might result in CFN throttling your Buckler ID
polling_interval = 60  # 1 minute

# How long of a duration (in seconds) should we expect the battle count to increase
battle_count_timeout = 360  # 6 minutes

# CFN configuration
buckler_id = ""
buckler_r_id = ""
buckler_praise_date = 1234567890123

# Pushover configuration
pushover_enabled = true
pushover_app_key = ""
pushover_user_key = ""

# Emergency-priority alert tuning (stuck-farm incidents)
# How often (in seconds) Pushover re-delivers an unacknowledged emergency alert.
# Minimum 30 per the Pushover API; 120 favors coverage over intensity.
emergency_retry = 120  # 2 minutes

# How long (in seconds) Pushover keeps re-delivering before the alert expires.
# Maximum (and default) is 10800 = 3 hours.
emergency_expire = 10800  # 3 hours

# After you acknowledge a stuck-farm alert that hasn't actually recovered yet,
# re-alert this many seconds later (an on-call style ack timeout). Set 0 to disable.
re_alert_after_ack = 600  # 10 minutes

# Local status page (status_server.py) configuration.
# Port the status page binds on (0.0.0.0, LAN-accessible). Avoid 8080 if Steam
# is running, as it occupies that port. Omit this key to use the default (8675).
status_page_port = 8675
